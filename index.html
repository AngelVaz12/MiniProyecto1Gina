<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Intercambio de Regalos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

</head>
<body>

<!-- HEADER RESPONSIVO -->
<header class="container mt-4 mb-4">
    <!-- Título -->
    <div class="row justify-content-center mb-3">
        <div class="col-auto text-center">
            <h2 class="fw-bold">Generador de intercambio</h2>
        </div>
    </div>

    <!-- Logo centrado -->
    <div class="row justify-content-center">
        <div class="col-auto text-center">
            <img src="img/logo.png" alt="Mi amigo secreto" class="logo img-fluid">
        </div>
    </div>
</header>

<!-- CONTENEDOR PRINCIPAL -->
<div class="container p-4 p-sm-3 p-md-4 my-3 my-md-4 bg-light rounded shadow" style="max-width:900px;">

    <!-- ORGANIZADOR -->
    <div class="section mb-4">
        <h5>¿Quién organiza el intercambio?</h5>
        <input type="text" class="form-control mb-2" id="organizador" placeholder="Nombre del organizador">

        <div class="form-check mt-2">
            <input class="form-check-input" type="checkbox" id="participa" onchange="generarExclusiones()">
            <label class="form-check-label">
                El organizador participa
            </label>
        </div>
    </div>

    <hr>

    <!-- PARTICIPANTES -->
    <div class="section mb-4">
        <h5>Participantes</h5>
        <div class="input-group mb-3">
            <input type="text" id="nombreParticipante" class="form-control" placeholder="Nombre">
            <button class="btn btn-main" onclick="agregarParticipante()">Agregar</button>
        </div>
        <div id="listaParticipantes"></div>
    </div>

    <hr>

    <!-- EXCLUSIONES -->
    <div class="section mb-4">
        <h5>Exclusiones</h5>
        <p class="text-muted">Selecciona personas que no pueden regalarse entre sí</p>
        <div id="listaExclusiones"></div>
    </div>

    <hr>

    <!-- EVENTO -->
    <div class="section mb-4">
        <h5>Motivo del intercambio</h5>
        <div class="list-group" id="motivoLista">
            <button type="button" class="list-group-item list-group-item-action" data-value="Navidad">Navidad</button>
            <button type="button" class="list-group-item list-group-item-action" data-value="Cumpleaños">Cumpleaños</button>
            <button type="button" class="list-group-item list-group-item-action" data-value="San Valentin">San Valentín</button>
            <button type="button" class="list-group-item list-group-item-action" data-value="Trabajo">Trabajo</button>
            <button type="button" class="list-group-item list-group-item-action" data-value="Otro">Otro</button>
        </div>
        <div class="mt-2" id="inputOtroContainer" style="display:none;">
            <input type="text" id="eventoOtro" class="form-control" placeholder="Escribe tu motivo">
        </div>
        <input type="hidden" id="evento" name="evento">
    </div>

    <hr>

    <!-- FECHA -->
    <div class="section mb-4">
        <h5>Fecha del evento</h5>
        <input type="date" class="form-control" id="fecha">
    </div>

    <hr>

    <!-- PRESUPUESTO -->
   <div class="section mb-4">
    <h5>Presupuesto</h5>
    <div class="list-group" id="dineroLista">
        <button type="button" class="list-group-item list-group-item-action" data-value="200">200</button>
        <button type="button" class="list-group-item list-group-item-action" data-value="300">300</button>
        <button type="button" class="list-group-item list-group-item-action" data-value="400">400</button>
        <button type="button" class="list-group-item list-group-item-action" data-value="500">500</button>
        <button type="button" class="list-group-item list-group-item-action" data-value="Otro">Otro</button>
    </div>
    <div class="mt-2" id="presupuestoContainer" style="display:none;">
        <input type="text" id="presupuestoOtro" class="form-control" placeholder="Escribe tu Presupuesto">
    </div>
    <input type="hidden" id="presupuesto" name="presupuesto">
</div>

    <hr>

    <!-- BOTÓN DE SORTEO -->
    <div class="d-grid d-md-flex justify-content-md-center mt-3">
        <button class="btn btn-success btn-lg me-md-2" onclick="guardarDatos()">Realizar sorteo</button>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
