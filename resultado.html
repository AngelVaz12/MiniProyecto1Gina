<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Resultado del Sorteo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container-box">

  <h2 class="text-center mb-4">🎲 Resultado del Sorteo</h2>
  <h3 class="text-center mb-4">
    <div class="info-card">
        <strong id="motivoR"></strong> 
    </div>
  </h3>

 <div class="info-general mb-4 text-center">
    <div class="info-card">
        <strong>Organizador:</strong> <span id="organizadorR"></span>
    </div>
    <div class="info-card">
        <strong>Fecha:</strong> <span id="fechaR"></span>
    </div>
    <div class="info-card">
        <strong>Presupuesto:</strong> $<span id="presupuestoR"></span>
    </div>
</div>

  <!-- Contenedor de resultados uno por uno -->
  <div id="resultadoUno" class="text-center mb-3"></div>

  <!-- Botón para revelar siguiente intercambio -->
  <div class="text-center">
    <button id="btnSiguiente" class="btn btn-main">Siguiente</button>
    <button id="btnReiniciar" class="btn btn-success">Nuevo sorteo</button>
  </div>



</div>

<script src="js/sorteo.js"></script>

</body>
</html>
